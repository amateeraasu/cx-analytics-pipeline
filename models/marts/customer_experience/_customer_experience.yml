version: 2

models:
  - name: dim_customers
    description: >
      Customer dimension at the customer_unique_id grain with RFM aggregates,
      delivery performance, and behavioural segments.
    columns:
      - name: customer_unique_id
        tests: [unique, not_null]
      - name: customer_sk
        tests: [unique, not_null]

  - name: fct_orders
    description: >
      Order fact table with payment, delivery, review, and basket metrics.
      One row per order_id.
    columns:
      - name: order_id
        tests: [unique, not_null]

  - name: cx_satisfaction_summary
    description: >
      Monthly CX KPIs — CSAT rate, on-time delivery rate, GMV, and review counts.
      Only delivered orders are included.
    columns:
      - name: order_month
        tests: [unique, not_null]

  - name: mart_churn_predictions
    description: >
      ML churn probability scores enriched with customer context.
      Generated by notebooks/churn_prediction.ipynb — run the notebook before
      materialising this model.
    columns:
      - name: customer_unique_id
        tests: [unique, not_null]
      - name: churn_probability
        tests: [not_null]
      - name: churn_risk_tier
        tests:
          - not_null
          - accepted_values:
              values: [critical, high, medium, low]
