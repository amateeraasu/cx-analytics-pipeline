cx_analytics:
  target: dev
  outputs:

    # ── Local development (default) ───────────────────────────────────────────
    dev:
      type: duckdb
      path: "data/cx_analytics.duckdb"
      threads: 4

    # ── Databricks / Delta Lake ───────────────────────────────────────────────
    # Prerequisites:
    #   1. Run databricks/notebooks/01_bronze_ingest.py in your workspace
    #   2. Set the four env vars below (personal access token or service principal)
    #   3. dbt run --target databricks --profiles-dir .
    #
    # Environment variables:
    #   DBT_DATABRICKS_HOST      e.g. adb-1234567890.12.azuredatabricks.net
    #   DBT_DATABRICKS_HTTP_PATH e.g. /sql/1.0/warehouses/abc123def456
    #   DBT_DATABRICKS_TOKEN     personal access token from Databricks UI
    #   DBT_DATABRICKS_CATALOG   Unity Catalog name (default: hive_metastore)
    #   DBT_OLIST_SOURCE_SCHEMA  schema containing Bronze source views (default: olist_bronze)
    databricks:
      type: databricks
      host: "{{ env_var('DBT_DATABRICKS_HOST') }}"
      http_path: "{{ env_var('DBT_DATABRICKS_HTTP_PATH') }}"
      token: "{{ env_var('DBT_DATABRICKS_TOKEN') }}"
      catalog: "{{ env_var('DBT_DATABRICKS_CATALOG', 'hive_metastore') }}"
      schema: cx_analytics
      threads: 4
